        <div class="fixture-save-row">
          <button class="fixture-confirm ${saved?'saved':''}" onclick="saveFixture(${gIdx},${fIdx})">${saved?'✓ Saved':'Save Result'}</button>
        </div>
      </div>`;
    });
    html += `</div></div>`;
  });

  html += `</div>`;

  // Qualifiers summary
  const qualifiers = [];
  standings.forEach((st, gIdx) => {
    st.slice(0, setup.best3rd > 0 ? setup.qualifyPer : setup.qualifyPer).forEach(row => {
      qualifiers.push({ teamIdx: row.teamIdx, group: groups[gIdx].name, pos: st.indexOf(row)+1 });
    });
  });
  best3rdTeams.forEach(tIdx => {
    const gIdx = groups.findIndex(g => g.teams.includes(tIdx));
    qualifiers.push({ teamIdx: tIdx, group: groups[gIdx]?.name || '?', pos: '3rd*' });
  });

  if (qualifiers.length) {
    html += `<div class="section-title" style="margin-top:8px">Qualified Teams (${qualifiers.length})</div>
    <table class="data-table" style="margin-bottom:0">
      <thead><tr><th>Team</th><th>Group</th><th>Finished</th><th>Participant</th></tr></thead>
      <tbody>`;
    qualifiers.forEach(q => {
      const team = s.teams[q.teamIdx];
      const pIdx = team?.participant;
      const p = (pIdx !== null && pIdx !== undefined) ? s.participants[pIdx] : null;
      html += `<tr>
        <td style="font-weight:500">${team ? esc(team.name) : '—'}</td>
        <td>${esc(q.group)}</td>
        <td>${q.pos === 1 ? '🥇 1st' : q.pos === 2 ? '🥈 2nd' : q.pos === '3rd*' ? '⭐ Best 3rd' : q.pos+'th'}</td>
        <td>${p ? `<div class="participant-badge"><div class="avatar" style="background:${colorFor(pIdx)};color:#0f0e0c">${initials(p.name)}</div>${esc(p.name)}</div>` : '<span style="color:var(--text-muted)">—</span>'}</td>
      </tr>`;
    });
    html += `</tbody></table>`;
  }

  return html;
}

function toggleFixtures(gIdx) {
  const el = document.getElementById('fixtures' + gIdx);
  if (!el) return;
  el.classList.toggle('hidden');
  const btn = document.getElementById('fixtureToggle' + gIdx);
  if (btn) btn.textContent = el.classList.contains('hidden') ? '▼ Fixtures' : '▲ Fixtures';
}

function computeStandings(s, gIdx) {
  const group = s.groups.groups[gIdx];
  const { ptsWin, ptsDraw } = s.groups.setup;
  const rows = {};
  group.teams.filter(t => t !== null).forEach(tIdx => {
    rows[tIdx] = { teamIdx: tIdx, p:0, w:0, d:0, l:0, gf:0, ga:0, gd:0, pts:0 };
  });
  group.fixtures.forEach(fix => {
    if (fix.score1 === null || fix.score2 === null) return;
    const r1 = rows[fix.team1]; const r2 = rows[fix.team2];
    if (!r1 || !r2) return;
    r1.p++; r2.p++;
    r1.gf += fix.score1; r1.ga += fix.score2;
    r2.gf += fix.score2; r2.ga += fix.score1;
    r1.gd = r1.gf - r1.ga; r2.gd = r2.gf - r2.ga;
    if (fix.score1 > fix.score2) { r1.w++; r2.l++; r1.pts += ptsWin; }
    else if (fix.score1 < fix.score2) { r2.w++; r1.l++; r2.pts += ptsWin; }
    else { r1.d++; r2.d++; r1.pts += ptsDraw; r2.pts += ptsDraw; }
  });
  const tiebreakOrder = group.tiebreakOrder || [];
  return Object.values(rows).sort((a, b) => {
    if (b.pts !== a.pts) return b.pts - a.pts;
    if (b.gd !== a.gd) return b.gd - a.gd;
    if (b.gf !== a.gf) return b.gf - a.gf;
    // All stats equal — use manual tiebreak order if set
    const ai = tiebreakOrder.indexOf(a.teamIdx);
    const bi = tiebreakOrder.indexOf(b.teamIdx);
    if (ai !== -1 && bi !== -1) return ai - bi;
    return 0;
  });
}

function saveFixture(gIdx, fIdx) {
  const s = getActive();
  const fix = s.groups.groups[gIdx].fixtures[fIdx];
  const s1 = document.getElementById(`fs_${gIdx}_${fIdx}_1`)?.value;
  const s2 = document.getElementById(`fs_${gIdx}_${fIdx}_2`)?.value;
  if (s1 === '' || s2 === '') { alert('Enter both scores before saving.'); return; }
  fix.score1 = parseInt(s1); fix.score2 = parseInt(s2);
  save(); renderMain();
}

function confirmAction(btn, action) {
  if (btn.dataset.confirming === 'true') {
    btn.dataset.confirming = 'false';
    btn.textContent = btn.dataset.originalText;
    btn.classList.remove('btn-confirming');
    action();
    return;
  }
  btn.dataset.confirming = 'true';
  btn.dataset.originalText = btn.textContent;
  btn.textContent = 'Are you sure?';
  btn.classList.add('btn-confirming');
  setTimeout(() => {
    if (btn.dataset.confirming === 'true') {
      btn.dataset.confirming = 'false';
      btn.textContent = btn.dataset.originalText;
      btn.classList.remove('btn-confirming');
    }
  }, 3000);
}

function swapTiebreak(gIdx, teamIdxA, teamIdxB) {
  const s = getActive();
  if (!s) return;
  const group = s.groups.groups[gIdx];
  const st = computeStandings(s, gIdx);
  // Initialise tiebreakOrder from current standings if not set
  if (!group.tiebreakOrder || group.tiebreakOrder.length === 0)
    group.tiebreakOrder = st.map(r => r.teamIdx);
  const order = group.tiebreakOrder;
  const ai = order.indexOf(teamIdxA);
  const bi = order.indexOf(teamIdxB);
  if (ai !== -1 && bi !== -1) { [order[ai], order[bi]] = [order[bi], order[ai]]; }
  save(); renderTab();
}

function generateFixtures(group) {
  const teams = group.teams.filter(t => t !== null);
  const fixtures = [];
  for (let i = 0; i < teams.length; i++)
    for (let j = i+1; j < teams.length; j++)
      fixtures.push({ team1: teams[i], team2: teams[j], score1: null, score2: null });
  return fixtures;
}

function confirmGroups() {
  const s = getActive();
  if (!s || !s.groups) return;
  s.groups.groups.forEach(g => { g.fixtures = generateFixtures(g); });
  s.groups.editing = false;
  save(); renderTab();
}

function enterGroupEditMode() {
  const s = getActive();
  if (!s || !s.groups) return;
  s.groups.editing = true;
  save(); renderTab();
}

function resetGroups() {
  const s = getActive();
  if (!s) return;

}

function updateGroupName(gIdx, val) {
  const s = getActive();
  if (!s || !s.groups) return;

  save();
}

function setGroupSlot(gIdx, slot, value) {
  const s = getActive();

function addGroupSlot(gIdx) {

}

function addGroup() {
  const s = getActive();
  if (!s || !s.groups) return;
  const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  const n = s.groups.groups.length;
  s.groups.groups.push({ name: 'Group ' + (letters[n] || (n+1)), teams: [null, null, null, null], fixtures: [] });

// SHARE — URL-based state encoding
// ══════════════════════════════════════════════
let readOnlyMode = false;
let readOnlySweep = null;

function shareSweepstake() {
  const s = getActive();
  if (!s) return;
  try {
    const json = JSON.stringify(s);
    const compressed = LZString.compressToEncodedURIComponent(json);
    const url = `${location.href.split('#')[0]}#share=${compressed}`;
    navigator.clipboard.writeText(url).then(() => showToast('🔗 Link copied to clipboard!'))
      .catch(() => {
        // Fallback: prompt with the URL
        prompt('Copy this link to share:', url);
      });
  } catch(e) {
    alert('Could not generate share link. The sweepstake may be too large.');
  }
}

function showToast(msg) {
  const t = document.getElementById('shareToast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function checkShareURL() {
  const hash = location.hash;
  if (!hash.startsWith('#share=')) return false;
  try {
    const compressed = hash.slice(7);
    const json = LZString.decompressFromEncodedURIComponent(compressed);
    if (!json) throw new Error('Decompress failed');
    const sweep = JSON.parse(json);
    readOnlyMode = true;
    readOnlySweep = sweep;
    renderReadOnly(sweep);
    return true;
  } catch(e) {
    document.body.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#0f0e0c;color:#f87171;font-family:sans-serif;text-align:center;padding:20px">
      <div><div style="font-size:48px;margin-bottom:16px">⚠️</div><div style="font-size:18px;margin-bottom:8px">Invalid share link</div><div style="font-size:13px;opacity:0.6">The link may be corrupted or incomplete.</div></div>
    </div>`;
    return true;
  }
}

      round.matches.forEach(match => {

              placed[1]=finalMatch.winner===0?finalMatch.team2:finalMatch.team1;
            }
            if(rounds.length>=2){
              rounds[rounds.length-2].matches.forEach(m=>{
                if(m.winner!==null&&m.winner!==undefined){
                  const loser=m.winner===0?m.team2:m.team1;
                  if(loser!==null&&loser!==undefined&&!placed.includes(loser))placed.push(loser);

              });
            }

            return `<div class="payout-row">
              <div class="payout-left"><span class="place-medal">${MEDALS[i]||'🏅'}</span>
              <div><div class="payout-label">${esc(sp.label)}</div>
              <div class="payout-winner">${team?`${esc(team.name)}${participant?` · ${esc(participant.name)}`:''}`:'<em>To be determined</em>'}</div></div></div>
              <div style="text-align:right"><div class="payout-amount">${fmt(s.currency,amount)}</div><div class="payout-pct">${sp.pct}%</div></div>
            </div>`;
          }).join('');
        })()}
      </div>

      <!-- GROUPS -->
      ${groupsHTML}

      <!-- BRACKET -->
      ${bracketHTML}

    </div>
  </div>`;
}



function sortTeams(teams) {
  return [...teams].sort((a, b) => {
    const aSeeded = a.seed != null, bSeeded = b.seed != null;
    if (aSeeded && bSeeded) return a.seed - b.seed;
    if (aSeeded) return -1;
    if (bSeeded) return 1;
    return a.name.localeCompare(b.name);
  });
}

function exportBackup() {
  const data = JSON.stringify(state, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `sweepstakr-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('✅ Saved to your Downloads folder');
}

function importBackup(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const imported = JSON.parse(ev.target.result);
      if (!imported.sweepstakes || !Array.isArray(imported.sweepstakes)) throw new Error('Invalid format');
      const merge = imported.sweepstakes.filter(imp =>
        !state.sweepstakes.find(ex => ex.id === imp.id)
      );
      const overwrite = imported.sweepstakes.filter(imp =>
        state.sweepstakes.find(ex => ex.id === imp.id)
      );
      if (overwrite.length > 0) {
        overwrite.forEach(imp => {
          const idx = state.sweepstakes.findIndex(ex => ex.id === imp.id);
          state.sweepstakes[idx] = imp;
        });
      }
      state.sweepstakes.push(...merge);
      if (!state.activeSweepId && state.sweepstakes.length > 0) {
        state.activeSweepId = state.sweepstakes[0].id;
      }
      save(); renderSidebar(); renderMain();
      showToast(`✅ Imported ${imported.sweepstakes.length} sweepstake${imported.sweepstakes.length !== 1 ? 's' : ''}`);
    } catch {
      showToast('❌ Invalid backup file');
    }
    e.target.value = '';
  };
  reader.readAsText(file);
}

      { name: 'Group H', teams: ['Spain', 'Uruguay', 'Saudi Arabia', 'Cape Verde'] },
      { name: 'Group I', teams: ['France', 'Senegal', 'Norway', 'Iraq'] },
      { name: 'Group J', teams: ['Argentina', 'Austria', 'Algeria', 'Jordan'] },

  }
};

function applyTemplate(key) {
  const t = TEMPLATES[key];
  const info = document.getElementById('templateInfo');
  if (!t) { info.textContent = ''; return; }
  document.getElementById('sweepName').value = t.name;
  teamInputs = t.groups.flatMap(g => g.teams);
  renderTeamInputs();
  splitRows = t.split.map(s => ({...s}));
  renderSplitRows();
  document.getElementById('templateSelect').dataset.key = key;
  info.textContent = t.info;
}

function applyPendingTemplate(sweep) {
  const sel = document.getElementById('templateSelect');
  if (!sel) return;
  const key = sel.dataset.key;
  const t = TEMPLATES[key];
  if (!t) return;
  const groups = t.groups.map(g => ({
    name: g.name,
    teams: g.teams.map(name => sweep.teams.findIndex(t => t.name === name)).filter(i => i !== -1),
    fixtures: []
  }));
  sweep.groups = { setup: {...t.groupSetup}, groups, editing: false };
  sweep.groups.groups.forEach(g => {
    g.fixtures = [];
    for (let i = 0; i < g.teams.length; i++)
      for (let j = i + 1; j < g.teams.length; j++)
        g.fixtures.push({ team1: g.teams[i], team2: g.teams[j], score1: null, score2: null });
  });
}

function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', function(e) { if (e.target === this) closeModal(this.id); });
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.querySelectorAll('.modal-overlay:not(.hidden)').forEach(m => closeModal(m.id));
});

  load();
  renderSidebar();
  if (state.activeSweepId && getActive()) {
    renderMain();
  }
}
