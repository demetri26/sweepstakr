<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com;">
<title>Sweepstakr</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.5.0/lz-string.min.js"></script>
<style>
  :root {
    --bg: #0f0e0c;
    --surface: #1a1916;
    --surface2: #242220;
    --surface3: #2e2b28;
    --border: #3a3733;
    --gold: #f0b429;
    --silver: #9ca3af;
    --bronze: #cd7c3a;
    --green: #34d399;
    --red: #f87171;
    --text: #f0ece4;
    --text-muted: #8a8070;
    --radius: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; line-height: 1.5; }

  /* LAYOUT */
  .app { display: flex; height: 100vh; overflow: hidden; }
  .sidebar { width: 260px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
  .sidebar-header { padding: 24px 20px 16px; border-bottom: 1px solid var(--border); }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 2px; color: var(--gold); line-height: 1; }
  .logo-sub { font-size: 10px; letter-spacing: 3px; color: var(--text-muted); text-transform: uppercase; margin-top: 2px; }
  .sidebar-list { flex: 1; overflow-y: auto; padding: 12px 0; }
  .sidebar-section-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); padding: 8px 20px 4px; }
  .sweep-item { display: flex; align-items: center; gap: 10px; padding: 10px 20px; cursor: pointer; transition: background 0.15s; border-left: 3px solid transparent; }
  .sweep-item:hover { background: var(--surface2); }
  .sweep-item.active { background: var(--surface2); border-left-color: var(--gold); }
  .sweep-item-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
  .sweep-item.active .sweep-item-dot { background: var(--gold); }
  .sweep-item-status-live .sweep-item-dot { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .sweep-item-name { flex: 1; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sweep-item-badge { font-size: 10px; padding: 2px 6px; border-radius: 999px; background: var(--surface3); color: var(--text-muted); }
  .sweep-item-status-live .sweep-item-badge { background: rgba(52,211,153,0.15); color: var(--green); }
  .btn-new { margin: 12px; padding: 10px; background: var(--gold); color: #0f0e0c; border: none; border-radius: var(--radius); font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 13px; cursor: pointer; transition: opacity 0.15s; text-align: center; width: calc(100% - 24px); }
  .btn-new:hover { opacity: 0.85; }

  /* MAIN */
  .main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 16px 28px; border-bottom: 1px solid var(--border); background: var(--surface); position: sticky; top: 0; z-index: 10; flex-wrap: wrap; gap: 10px; }
  .topbar-left { display: flex; align-items: center; gap: 12px; }
  .topbar-title { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 2px; }
  .tab-bar { display: flex; gap: 4px; background: var(--surface2); padding: 4px; border-radius: var(--radius); }
  .tab { padding: 6px 14px; border-radius: 4px; border: none; background: transparent; color: var(--text-muted); font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer; transition: all 0.15s; }
  .tab.active { background: var(--surface3); color: var(--text); }
  .content { padding: 24px 28px; flex: 1; }

  /* EMPTY */
  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 16px; color: var(--text-muted); padding: 60px; text-align: center; }
  .empty-icon { font-size: 56px; opacity: 0.4; }
  .empty-title { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 2px; color: var(--text); }
  .empty-sub { font-size: 13px; max-width: 300px; }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); display: flex; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(4px); }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; width: 580px; max-width: 95vw; max-height: 90vh; overflow-y: auto; padding: 28px; }
  .modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; margin-bottom: 20px; color: var(--gold); }

  /* FORM */
  .form-group { margin-bottom: 16px; }
  label { display: block; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px; }
  input[type=text], input[type=number], select { width: 100%; padding: 9px 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; transition: border-color 0.15s; }
  input:focus, select:focus { border-color: var(--gold); }
  select option { background: var(--surface2); }
  .input-prefix { display: flex; align-items: center; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .input-prefix span { padding: 9px 12px; color: var(--gold); font-family: 'DM Mono', monospace; font-size: 13px; border-right: 1px solid var(--border); background: var(--surface3); min-width: 36px; text-align: center; }
  .input-prefix input { border: none; border-radius: 0; flex: 1; }
  .input-prefix input:focus { border: none; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .list-input-area { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px; max-height: 180px; overflow-y: auto; }
  .list-input-row { display: flex; gap: 8px; align-items: center; margin-bottom: 6px; }
  .list-input-row:last-child { margin-bottom: 0; }
  .list-input-row input { margin: 0; flex: 1; font-size: 13px; }
  .btn-icon { width: 30px; height: 30px; border-radius: var(--radius); border: none; background: var(--surface3); color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 17px; line-height: 1; transition: all 0.15s; }
  .btn-icon:hover { background: var(--red); color: white; }
  .btn-add-item { padding: 7px 12px; background: transparent; border: 1px dashed var(--border); border-radius: var(--radius); color: var(--text-muted); font-size: 12px; cursor: pointer; width: 100%; margin-top: 8px; transition: all 0.15s; font-family: 'DM Sans', sans-serif; }
  .btn-add-item:hover { border-color: var(--gold); color: var(--gold); }
  .split-config { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; }
  .split-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .split-place-label { font-size: 12px; font-weight: 600; min-width: 24px; text-align: center; }
  .gold-text { color: var(--gold); }
  .silver-text { color: var(--silver); }
  .bronze-text { color: var(--bronze); }
  .split-label-input { flex: 1; font-size: 12px !important; padding: 6px 10px !important; }
  .split-pct-wrap { display: flex; align-items: center; background: var(--surface3); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; width: 90px; }
  .split-pct-wrap span { padding: 6px 8px; color: var(--text-muted); font-size: 12px; }
  .split-pct-wrap input { border: none; border-radius: 0; width: 50px; padding: 6px 8px; background: transparent; font-size: 13px; font-family: 'DM Mono', monospace; }
  .split-total { font-size: 12px; color: var(--text-muted); text-align: right; margin-top: 6px; }
  .split-total.error { color: var(--red); }
  .split-total.ok { color: var(--green); }
  .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border); }

  /* BUTTONS */
  .btn { padding: 9px 20px; border-radius: var(--radius); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: all 0.15s; }
  .btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
  .btn-ghost:hover { color: var(--text); border-color: var(--text-muted); }
  .btn-primary { background: var(--gold); color: #0f0e0c; font-weight: 600; }
  .btn-primary:hover { opacity: 0.85; }
  .btn-danger { background: transparent; color: var(--red); border: 1px solid rgba(248,113,113,0.4); }
  .btn-danger:hover { background: var(--red); color: white; border-color: var(--red); }
  .btn-sm { padding: 5px 12px; font-size: 12px; }

  /* STATS */
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
  .stat-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
  .stat-value { font-family: 'Bebas Neue', sans-serif; font-size: 30px; letter-spacing: 1px; color: var(--gold); line-height: 1; }
  .stat-sub { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
  .section-title { font-family: 'Bebas Neue', sans-serif; font-size: 17px; letter-spacing: 2px; margin-bottom: 12px; }

  /* TABLE */
  .data-table { width: 100%; border-collapse: collapse; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 20px; }
  .data-table th { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); padding: 10px 10px; text-align: left; background: var(--surface2); border-bottom: 1px solid var(--border); }
  .data-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); font-size: 12px; }
  .data-table tr:last-child td { border-bottom: none; }
  .data-table tr:hover td { background: rgba(255,255,255,0.02); }

  /* BADGES */
  .participant-badge { display: inline-flex; align-items: center; gap: 6px; background: var(--surface3); border-radius: 4px; padding: 3px 9px; font-size: 12px; }
  .avatar { width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; flex-shrink: 0; }
  .status-badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-family: 'DM Mono', monospace; }
  .status-active { background: rgba(52,211,153,0.12); color: var(--green); }
  .status-eliminated { background: rgba(248,113,113,0.12); color: var(--red); }
  .status-pending { background: var(--surface3); color: var(--text-muted); }
  .tag { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-muted); background: var(--surface3); padding: 2px 7px; border-radius: 3px; }
  .pill { display: inline-block; padding: 2px 7px; border-radius: 999px; font-size: 11px; background: var(--surface3); color: var(--text-muted); margin-left: 4px; }

  /* DRAW */
  .draw-toolbar { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  .assign-btn { padding: 3px 10px; border-radius: var(--radius); border: 1px solid var(--border); background: transparent; color: var(--text-muted); font-size: 11px; cursor: pointer; transition: all 0.15s; font-family: 'DM Sans', sans-serif; }
  .assign-btn:hover { border-color: var(--gold); color: var(--gold); }

  /* BRACKET */
  .bracket-wrap { overflow-x: auto; padding-bottom: 20px; }
  .bracket { display: flex; align-items: stretch; user-select: none; }
  .bracket-round { display: flex; flex-direction: column; min-width: 190px; }
  .round-label-wrap { display: flex; align-items: center; gap: 6px; padding: 0 12px 14px; justify-content: center; }
  .round-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); text-align: center; }
  .round-label-edit { font-size: 10px; background: transparent; border: none; border-bottom: 1px dashed var(--border); color: var(--text-muted); font-family: 'DM Sans', sans-serif; letter-spacing: 1px; text-transform: uppercase; outline: none; width: 110px; text-align: center; cursor: text; padding: 1px 4px; }
  .round-label-edit:focus { border-bottom-color: var(--gold); color: var(--text); }
  .round-matches { display: flex; flex-direction: column; flex: 1; justify-content: space-around; }
  .match-slot { display: flex; align-items: center; padding: 6px 12px; position: relative; }
  .match-card-b { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; width: 166px; flex-shrink: 0; transition: border-color 0.15s; }
  .match-card-b.editable { cursor: default; }
  .match-card-b.clickable { cursor: pointer; }
  .match-card-b.clickable:hover { border-color: var(--gold); }
  .b-team { display: flex; align-items: center; justify-content: space-between; padding: 5px 8px; font-size: 12px; gap: 6px; border-bottom: 1px solid var(--border); }
  .b-team:last-child { border-bottom: none; }
  .b-team.winner { background: rgba(240,180,41,0.1); }
  .b-team.winner .b-name { color: var(--gold); font-weight: 600; }
  .b-team.loser .b-name { color: var(--text-muted); text-decoration: line-through; opacity: 0.6; }
  .b-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .b-score { font-family: 'DM Mono', monospace; font-size: 12px; min-width: 20px; text-align: center; color: var(--text-muted); }
  .b-team.winner .b-score { color: var(--gold); }
  .bye-label { color: var(--text-muted); font-style: italic; font-size: 11px; }
  .connector { width: 20px; flex-shrink: 0; position: relative; }
  /* team slot selector inside bracket setup */
  .slot-select { width: 100%; background: var(--surface2); border: none; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 12px; padding: 5px 8px; outline: none; cursor: pointer; }
  .slot-select:focus { background: var(--surface3); }
  .slot-select option { background: var(--surface2); }
  /* bracket setup panel */
  .bracket-setup { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 20px; }
  .bracket-setup-title { font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 2px; margin-bottom: 14px; }
  .setup-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; margin-bottom: 16px; }
  .setup-match { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .setup-match-header { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted); padding: 6px 10px; background: var(--surface3); border-bottom: 1px solid var(--border); }


  /* GROUP STAGE */
  .groups-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .group-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .group-card .data-table td:first-child { word-break: break-word; min-width: 80px; }
  .team-name-cell { max-width: 100px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: block; }
  .group-card-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: var(--surface2); border-bottom: 1px solid var(--border); }
  .group-card-title { font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 2px; color: var(--gold); }
  .group-table { width: 100%; border-collapse: collapse; font-size: 12px; table-layout: fixed; }
  .group-table th { padding: 6px 2px; color: var(--text-muted); font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; text-align: center; border-bottom: 1px solid var(--border); }
  .group-table th:first-child { text-align: left; padding-left: 10px; width: 44%; }
  .group-table th.gt-stat { width: 7%; }
  .group-table th.gt-pts { width: 9%; }
  .group-table th.gt-reorder { width: 16px; padding: 0; }
  .group-table td { padding: 7px 2px; border-bottom: 1px solid var(--border); text-align: center; overflow: hidden; }
  .group-table td:first-child { text-align: left; padding-left: 10px; }
  .gt-team-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 12px; display: block; }
  .gt-reorder-cell { padding: 0 !important; width: 16px; text-align: center !important; }
  .gt-reorder-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 7px; padding: 0; opacity: 0.35; transition: opacity 0.15s; line-height: 1.4; display: block; width: 100%; text-align: center; }
  .gt-reorder-btn:hover { opacity: 1; color: var(--gold); }
  @media (max-width: 700px) {
    .gt-gfga { display: none; }
  }
  .gt-participant { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 10px; margin-top: 1px; font-weight: 400; opacity: 0.9; }
  .group-table tr:last-child td { border-bottom: none; }
  .group-table tr.qualified td:first-child { border-left: 3px solid var(--green); padding-left: 7px; }
  .group-table tr.qualified-3rd td:first-child { border-left: 3px solid var(--gold); padding-left: 7px; }
  .group-table tr:hover td { background: rgba(255,255,255,0.02); }
  .pts-cell { font-family: 'DM Mono', monospace; font-weight: 600; color: var(--text); }
  .gd-cell { font-family: 'DM Mono', monospace; color: var(--text-muted); }
  .gd-cell.pos { color: var(--green); }
  .gd-cell.neg { color: var(--red); }
  .group-fixtures { border-top: 1px solid var(--border); }
  .fixture-row { border-bottom: 1px solid var(--border); padding: 8px 12px; }
  .fixture-row:last-child { border-bottom: none; }
  .fixture-team-line { display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 8px; padding: 2px 0; }
  .fixture-team-line + .fixture-team-line { border-top: 1px dashed var(--border); margin-top: 4px; padding-top: 6px; }
  .fx-team-info { display: flex; flex-direction: column; min-width: 0; overflow: hidden; }
  .fx-name { font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .fx-participant { font-size: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; opacity: 0.85; margin-top: 1px; }
  .fx-score-wrap { display: flex; align-items: center; gap: 6px; }
  .fx-score-label { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-muted); min-width: 28px; text-align: right; }
  .fixture-score-input { width: 44px; padding: 4px 6px; text-align: center; font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 600; background: var(--surface3); border: 1px solid var(--border); border-radius: 3px; color: var(--text); outline: none; }
  .fixture-score-input:focus { border-color: var(--gold); background: var(--surface2); }
  .fx-winner .fx-name { color: var(--text); font-weight: 600; }
  .fx-winner .fixture-score-input { color: var(--gold); border-color: rgba(240,180,41,0.3); }
  .fx-draw .fx-name { color: var(--text-muted); }
  .fx-loser .fx-name { color: var(--text-muted); opacity: 0.5; }
  .fx-loser .fixture-score-input { color: var(--text-muted); }
  .fixture-save-row { display: flex; justify-content: flex-end; padding-top: 6px; }
  .fixture-confirm { padding: 3px 10px; border-radius: 3px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); font-size: 10px; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
  .fixture-confirm:hover { border-color: var(--gold); color: var(--gold); }
  .fixture-confirm.saved { border-color: rgba(52,211,153,0.4); color: var(--green); background: rgba(52,211,153,0.06); }
  .group-slot-select { width: 100%; background: var(--surface2); border: none; border-bottom: 1px solid var(--border); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 12px; padding: 6px 10px; outline: none; cursor: pointer; }
  .group-slot-select:last-child { border-bottom: none; }
  .group-slot-select:focus { background: var(--surface3); }
  .group-slot-select option { background: var(--surface2); }
  .group-setup-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
  .groups-toolbar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
  .advance-legend { display: flex; gap: 14px; font-size: 11px; color: var(--text-muted); margin-bottom: 12px; flex-wrap: wrap; }
  .advance-legend span { display: flex; align-items: center; gap: 5px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

  /* RESULTS */
  .results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 12px; }
  .result-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; }
  .result-card-header { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
  .score-row { display: flex; align-items: center; gap: 10px; }
  .score-team-name { flex: 1; font-size: 13px; }
  .score-input { width: 54px; padding: 6px 8px; text-align: center; font-family: 'DM Mono', monospace; font-size: 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); outline: none; }
  .score-input:focus { border-color: var(--gold); }
  .vs-divider { text-align: center; font-size: 10px; letter-spacing: 2px; color: var(--text-muted); padding: 4px 0; }
  .confirm-btn { width: 100%; margin-top: 10px; padding: 7px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text-muted); font-size: 12px; cursor: pointer; transition: all 0.15s; font-family: 'DM Sans', sans-serif; }
  .confirm-btn:hover { border-color: var(--gold); color: var(--gold); }
  .confirm-btn.saved { border-color: rgba(52,211,153,0.4); color: var(--green); background: rgba(52,211,153,0.06); }

  /* PAYOUTS */
  .payout-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
  .payout-row { display: flex; align-items: center; justify-content: space-between; padding: 11px 0; border-bottom: 1px solid var(--border); }
  .payout-row:last-child { border-bottom: none; }
  .payout-left { display: flex; align-items: center; gap: 12px; }
  .place-medal { font-size: 20px; line-height: 1; }
  .payout-label { font-weight: 500; font-size: 14px; }
  .payout-winner { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .payout-amount { font-family: 'DM Mono', monospace; font-size: 20px; font-weight: 500; color: var(--gold); }
  .payout-pct { font-size: 11px; color: var(--text-muted); text-align: right; }

  /* MISC */
  .alert { padding: 10px 14px; border-radius: var(--radius); font-size: 13px; margin-bottom: 14px; }
  .alert-warn { background: rgba(240,180,41,0.08); border: 1px solid rgba(240,180,41,0.25); color: #d4922a; }
  .alert-info { background: rgba(52,211,153,0.07); border: 1px solid rgba(52,211,153,0.2); color: #2dbd8a; }
  .divider { border: none; border-top: 1px solid var(--border); margin: 18px 0; }
  .danger-zone { margin-top: 28px; padding-top: 18px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px var(--green); flex-shrink: 0; }
  .status-dot.draft { background: var(--text-muted); box-shadow: none; }
  .status-dot.complete { background: var(--gold); box-shadow: 0 0 8px var(--gold); }
  .no-data { color: var(--text-muted); font-size: 13px; padding: 30px 0; text-align: center; }
  .hidden { display: none !important; }
  .btn-confirming { background: var(--red) !important; border-color: var(--red) !important; color: #fff !important; }

  .sidebar-footer { padding: 10px 14px; border-top: 1px solid var(--border); display: flex; gap: 12px; justify-content: flex-end; align-items: center; }
  .sidebar-util-btn { background: none; border: none; color: var(--text-muted); font-size: 11px; font-family: 'DM Sans', sans-serif; padding: 2px 0; cursor: pointer; letter-spacing: 0.3px; transition: color 0.15s; display: inline-flex; align-items: center; line-height: 1; }
  .sidebar-util-btn:hover { color: var(--text); }

  .field-error { color: var(--red); font-size: 11px; margin-top: 5px; }

  /* SHARE BANNER */
  .share-banner { background: rgba(240,180,41,0.1); border-bottom: 1px solid rgba(240,180,41,0.3); padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
  .share-banner-text { font-size: 12px; color: var(--gold); display: flex; align-items: center; gap: 8px; }
  .share-toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--surface3); border: 1px solid var(--border); border-radius: 999px; padding: 10px 20px; font-size: 13px; color: var(--green); z-index: 9999; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
  .share-toast.show { opacity: 1; }

  .sweep-dropdown {
    display: none;
    width: calc(100% - 16px);
    margin: 8px;
    padding: 8px 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    cursor: pointer;
  }

  /* MOBILE */
  @media (max-width: 700px) {
    .app { flex-direction: column; height: auto; min-height: 100vh; overflow: auto; }
    .sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--border); flex-direction: row; align-items: center; flex-wrap: wrap; overflow: visible; }
    .sidebar-header { padding: 12px 16px; border-bottom: none; border-right: 1px solid var(--border); flex-shrink: 0; }
    .logo { font-size: 20px; }
    .logo-sub { display: none; }
    .sidebar-list { display: none; }
    .sweep-dropdown { display: block !important; flex: 1; margin: 8px; width: auto; }
    .sidebar-section-label { display: none; }
    .btn-new { margin: 8px; width: auto; flex-shrink: 0; padding: 8px 14px; white-space: nowrap; }
    .sidebar-footer { justify-content: flex-start; padding: 8px 12px; }
    .main { overflow: visible; }
    .topbar { position: static; flex-direction: column; align-items: flex-start; padding: 12px 14px; gap: 10px; }
    .topbar > div:last-child { width: 100%; overflow-x: auto; }
    .tab-bar { overflow-x: auto; width: 100%; }
    .tab { white-space: nowrap; flex-shrink: 0; }
    .content { padding: 14px; }
    .stats-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
    .groups-grid { grid-template-columns: 1fr; }
    .results-grid { grid-template-columns: 1fr; }
    .modal { padding: 20px 16px; }
    .form-row { grid-template-columns: 1fr; }
    .bracket-wrap { overflow-x: auto; }
    .bracket-round { min-width: 150px; }
    .match-card-b { width: 130px; }
    .danger-zone { flex-direction: column; align-items: flex-start; gap: 10px; }
    .topbar-left { flex-wrap: wrap; }
  }
  @media (max-width: 800px) {
    .stats-grid { grid-template-columns: 1fr 1fr; }
    .topbar { padding: 12px 16px; }
    .content { padding: 16px; }
  }
</style>
</head>
<body>
<div class="share-toast" id="shareToast">🔗 Link copied to clipboard!</div>
<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">🏆 Sweepstakr</div>
      <div class="logo-sub">sweepstakr.app</div>
    </div>
    <div class="sidebar-list">
      <div class="sidebar-section-label">Competitions</div>
      <div id="sweepItems"></div>
    </div>
    <select id="sweepDropdown" class="sweep-dropdown" onchange="selectSweep(this.value)" style="display:none"></select>
    <button class="btn-new" onclick="openNewModal()">+ New Sweepstake</button>
    <div class="sidebar-footer">
      <button class="sidebar-util-btn" onclick="exportBackup()">Export</button>
      <button class="sidebar-util-btn" onclick="document.getElementById('importFileInput').click()">Import</button>
      <input type="file" id="importFileInput" accept=".json" onchange="importBackup(event)" style="display:none">
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main" id="mainArea">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">🎰</div>
      <div class="empty-title">No Sweepstake Selected</div>
      <div class="empty-sub">Create a new competition or select one from the sidebar to get started.</div>
      <button class="btn btn-primary" onclick="openNewModal()" style="margin-top:8px">Create your first sweepstake</button>
    </div>
  </main>
</div>

<!-- ═══ MODALS ═══ -->

<!-- NEW / EDIT -->
<div class="modal-overlay hidden" id="sweepModal">
  <div class="modal">
    <div class="modal-title" id="sweepModalTitle">New Sweepstake</div>

    <div class="form-group" id="templateGroup">
      <label>Start from Template <span class="tag">optional</span></label>
      <select id="templateSelect" onchange="applyTemplate(this.value)" style="max-width:100%">
        <option value="">— Start blank —</option>
        <option value="wc2026">&#127757; FIFA World Cup 2026</option>
      </select>
      <div id="templateInfo" style="font-size:11px;color:var(--text-muted);margin-top:5px"></div>
    </div>
    <hr class="divider">

    <div class="form-group">
      <label>Competition Name</label>
      <input type="text" id="sweepName" placeholder="e.g. World Cup 2026" />
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Currency Symbol</label>
        <input type="text" id="sweepCurrency" value="£" maxlength="3" oninput="document.getElementById('feeSymbol').textContent=this.value||'£'" />
      </div>
      <div class="form-group">
        <label>Entry Fee per Person</label>
        <div class="input-prefix">
          <span id="feeSymbol">£</span>
          <input type="number" id="sweepFee" placeholder="10" min="0" step="0.01" />
        </div>
      </div>
    </div>

    <div class="form-group">
      <label>Prize Split <span class="tag">must total 100%</span></label>
      <div class="split-config">
        <div id="splitRows"></div>
        <button class="btn-add-item" onclick="addSplitRow()">+ Add place</button>
        <div class="split-total" id="splitTotal">Total: 0%</div>
      </div>
    </div>

    <hr class="divider">

    <div class="form-group">
      <label>Teams <span class="tag" id="teamCountTag">0</span></label>
      <div class="list-input-area" id="teamInputs"></div>
      <button class="btn-add-item" onclick="addTeamInput()">+ Add team</button>
    </div>

    <div class="form-group">
      <label>Participants <span class="tag" id="participantCountTag">0</span></label>
      <div class="list-input-area" id="participantInputs"></div>
      <button class="btn-add-item" onclick="addParticipantInput()">+ Add participant</button>
    </div>

    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('sweepModal')">Cancel</button>
      <button class="btn btn-primary" id="sweepSaveBtn" onclick="saveSweepstake()">Create Sweepstake</button>
    </div>
  </div>
</div>

<!-- ASSIGN TEAM -->
<div class="modal-overlay hidden" id="assignModal">
  <div class="modal" style="width:400px">
    <div class="modal-title">Assign Team</div>
    <p style="font-size:13px;color:var(--text-muted);margin-bottom:16px">Team: <strong style="color:var(--text)" id="assignTeamName"></strong></p>
    <div class="form-group">
      <label>Assign to Participant</label>
      <select id="assignParticipantSelect"></select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('assignModal')">Cancel</button>
      <button class="btn btn-primary" onclick="confirmAssign()">Assign</button>
    </div>
  </div>
</div>

<!-- BRACKET RESULT -->
<div class="modal-overlay hidden" id="bracketResultModal">
  <div class="modal" style="width:380px">
    <div class="modal-title">Record Result</div>
    <div id="bracketResultContent"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('bracketResultModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveBracketResult()">Save Result</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
// STATE & PERSISTENCE
// ══════════════════════════════════════════════
let state = { sweepstakes: [], activeSweepId: null };

function save() { try { localStorage.setItem('sweepApp_v2', JSON.stringify(state)); } catch(e) {} }
function load() { try { const d = localStorage.getItem('sweepApp_v2'); if (d) state = JSON.parse(d); } catch(e) {} }

// ══════════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════════
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function getActive() { return state.sweepstakes.find(s => s.id === state.activeSweepId) || null; }
function fmt(cur, amt) { return cur + parseFloat(amt||0).toFixed(2); }
function initials(name) { return (name||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2); }
const COLORS = ['#f0b429','#34d399','#60a5fa','#f87171','#a78bfa','#fb923c','#38bdf8','#4ade80','#e879f9','#fb7185','#facc15','#2dd4bf'];
function colorFor(i) { return COLORS[i % COLORS.length]; }
const MEDALS = ['🥇','🥈','🥉','4️⃣','5️⃣','6️⃣'];
const SUFFIXES = ['st','nd','rd','th','th','th'];

// ══════════════════════════════════════════════
// SIDEBAR
// ══════════════════════════════════════════════
function renderSidebar() {
  const el = document.getElementById('sweepItems');
  const dd = document.getElementById('sweepDropdown');
  if (!state.sweepstakes.length) {
    el.innerHTML = '<div style="padding:12px 20px;font-size:12px;color:var(--text-muted)">No competitions yet</div>';
    dd.innerHTML = '<option value="">No competitions yet</option>';
    return;
  }
  el.innerHTML = state.sweepstakes.map(s => {
    const live = s.status === 'live';
    const done = s.status === 'complete';
    const activeClass = s.id === state.activeSweepId ? 'active' : '';
    const liveClass = live ? 'sweep-item-status-live' : '';
    const badge = live ? 'Live' : done ? 'Done' : 'Draft';
    return `<div class="sweep-item ${activeClass} ${liveClass}" onclick="selectSweep('${s.id}')">
      <div class="sweep-item-dot"></div>
      <div class="sweep-item-name">${esc(s.name)}</div>
      <div class="sweep-item-badge">${badge}</div>
    </div>`;
  }).join('');
  dd.innerHTML = state.sweepstakes.map(s => {
    const badge = s.status === 'live' ? ' · Live' : s.status === 'complete' ? ' · Done' : '';
    return `<option value="${s.id}" ${s.id === state.activeSweepId ? 'selected' : ''}>${esc(s.name)}${badge}</option>`;
  }).join('');
}

function esc(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ══════════════════════════════════════════════
// SELECT
// ══════════════════════════════════════════════
let currentTab = 'overview';

function selectSweep(id) {
  state.activeSweepId = id;
  currentTab = 'overview';
  save();
  renderSidebar();
  renderMain();
}

// ══════════════════════════════════════════════
// MAIN
// ══════════════════════════════════════════════
function renderMain() {
  const main = document.getElementById('mainArea');
  const s = getActive();

  if (!s) {
    main.innerHTML = `<div class="empty-state">
      <div class="empty-icon">🎰</div>
      <div class="empty-title">No Sweepstake Selected</div>
      <div class="empty-sub">Create a new competition or select one from the sidebar.</div>
      <button class="btn btn-primary" onclick="openNewModal()" style="margin-top:8px">Create your first sweepstake</button>
    </div>`;
    return;
  }

  const dotClass = s.status === 'draft' ? 'draft' : s.status === 'complete' ? 'complete' : '';

  main.innerHTML = `
    <div class="topbar">
      <div class="topbar-left">
        <div class="status-dot ${dotClass}"></div>
        <div class="topbar-title">${esc(s.name)}</div>
        <span class="tag">${s.status.toUpperCase()}</span>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <div class="tab-bar">
          ${['overview','draw','groups','bracket','results','payouts'].map(t =>
            `<button class="tab ${currentTab===t?'active':''}" onclick="switchTab('${t}')">${t.charAt(0).toUpperCase()+t.slice(1)}</button>`
          ).join('')}
        </div>
        <button class="btn btn-ghost btn-sm" onclick="openEditModal()">Edit</button>
        <button class="btn btn-primary btn-sm" onclick="shareSweepstake()">🔗 Share</button>
      </div>
    </div>
    <div class="content" id="tabContent"></div>`;

  renderTab();
}

function switchTab(tab) {
  currentTab = tab;
  renderMain();
}

function renderTab() {
  const s = getActive();
  const el = document.getElementById('tabContent');
  if (!el || !s) return;
  const map = { overview: renderOverview, draw: renderDraw, groups: renderGroups, bracket: renderBracket, results: renderResults, payouts: renderPayouts };
  el.innerHTML = (map[currentTab] || renderOverview)(s);
}

// ══════════════════════════════════════════════
// OVERVIEW
// ══════════════════════════════════════════════
function renderOverview(s) {
  const pot = s.participants.length * parseFloat(s.fee || 0);
  const assigned = s.teams.filter(t => t.participant !== null && t.participant !== undefined).length;
  const elim = s.teams.filter(t => t.status === 'eliminated').length;
  const drawDone = assigned === s.teams.length && s.teams.length > 0;

  return `
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">Prize Pot</div>
      <div class="stat-value">${s.currency}${pot.toFixed(0)}</div>
      <div class="stat-sub">${s.participants.length} × ${fmt(s.currency, s.fee)}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Teams</div>
      <div class="stat-value">${s.teams.length}</div>
      <div class="stat-sub">${assigned} assigned · ${elim} out</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Participants</div>
      <div class="stat-value">${s.participants.length}</div>
      <div class="stat-sub">${fmt(s.currency, s.fee)} entry fee each</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Draw</div>
      <div class="stat-value" style="font-size:20px;padding-top:4px;color:${drawDone?'var(--green)':'var(--gold)'}">${drawDone?'✓ Complete':'⏳ Pending'}</div>
      <div class="stat-sub">${s.teams.length - assigned} unassigned</div>
    </div>
  </div>

  <div class="section-title">Prize Breakdown</div>
  <div class="payout-card" style="margin-bottom:24px">
    ${s.split.map((sp,i) => `
    <div class="payout-row">
      <div class="payout-left">
        <span class="place-medal">${MEDALS[i]||'🏅'}</span>
        <div>
          <div class="payout-label">${esc(sp.label)}</div>
          <div class="payout-winner" style="font-size:11px">${sp.pct}% of pot</div>
        </div>
      </div>
      <div class="payout-amount">${fmt(s.currency, pot * sp.pct / 100)}</div>
    </div>`).join('')}
  </div>

  <div class="section-title">Participants</div>
  <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px">
    ${s.participants.map((p,i) => {
      const myTeams = s.teams.filter(t => t.participant === i);
      return `<div class="participant-badge">
        <div class="avatar" style="background:${colorFor(i)};color:#0f0e0c">${initials(p.name)}</div>
        ${esc(p.name)}
        <span class="pill">${myTeams.length} team${myTeams.length!==1?'s':''}</span>
      </div>`;
    }).join('')}
    ${!s.participants.length ? '<span style="color:var(--text-muted);font-size:13px">No participants added yet.</span>' : ''}
  </div>

  <div class="danger-zone">
    <div>
      <div style="font-size:13px;font-weight:500;margin-bottom:2px">Competition Status</div>
      <div style="font-size:12px;color:var(--text-muted)">Currently: <strong style="color:var(--text)">${s.status}</strong></div>
    </div>
    <div style="display:flex;gap:8px">
      ${s.status === 'draft' ? `<button class="btn btn-primary btn-sm" onclick="setStatus('live')">▶ Go Live</button>` : ''}
      ${s.status === 'live'  ? `<button class="btn btn-ghost btn-sm" onclick="setStatus('complete')">Mark Complete</button>` : ''}
      <button class="btn btn-danger btn-sm" onclick="confirmAction(this, deleteSweep)">Delete</button>
    </div>
  </div>`;
}

// ══════════════════════════════════════════════
// DRAW
// ══════════════════════════════════════════════
function renderDraw(s) {
  const unassigned = s.teams.filter(t => t.participant === null || t.participant === undefined).length;
  return `
  <div class="draw-toolbar">
    <button class="btn btn-ghost btn-sm" onclick="doRandomDraw()">🎲 Random Draw</button>
    <button class="btn btn-ghost btn-sm" onclick="doSeededDraw()">🎯 Seeded Draw</button>
    ${unassigned > 0 ? `<button class="btn btn-ghost btn-sm" onclick="doRandomDrawUnassigned()">Random Unassigned (${unassigned})</button>` : ''}
    <button class="btn btn-danger btn-sm" onclick="confirmAction(this, clearAllAssignments)">Clear All</button>
  </div>
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:11px 14px;margin-bottom:12px;font-size:12px;color:var(--text-muted)">
    💡 <strong style="color:var(--text)">Seeded Draw</strong> distributes teams so each participant receives an even spread of seeded teams. Assign seed numbers (1 = best) in the table below, then click Seeded Draw.
  </div>
  ${unassigned > 0
    ? `<div class="alert alert-warn">⚠ ${unassigned} team${unassigned!==1?'s':''} unassigned. Use a draw option above or assign manually below.</div>`
    : `<div class="alert alert-info">✓ All teams have been assigned to participants.</div>`}
  <table class="data-table">
    <thead><tr><th>#</th><th>Team</th><th style="width:80px;text-align:center">Seed</th><th>Participant</th><th>Status</th><th></th></tr></thead>
    <tbody>
    ${s.teams.map((t,i) => {
      const pIdx = t.participant;
      const p = (pIdx !== null && pIdx !== undefined) ? s.participants[pIdx] : null;
      const statusClass = t.status === 'eliminated' ? 'status-eliminated' : t.status === 'active' ? 'status-active' : 'status-pending';
      return `<tr>
        <td style="color:var(--text-muted);font-family:'DM Mono',monospace;font-size:12px">${String(i+1).padStart(2,'0')}</td>
        <td style="font-weight:500">${esc(t.name)}</td>
        <td style="text-align:center">
          <input type="number" min="1" max="999" placeholder="—"
            value="${t.seed != null ? t.seed : ''}"
            oninput="setTeamSeed(${i}, this.value)"
            style="width:54px;padding:4px 6px;font-size:13px;font-family:'DM Mono',monospace;text-align:center;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);color:var(--gold);outline:none"
            onfocus="this.style.borderColor='var(--gold)'" onblur="this.style.borderColor='var(--border)'"
            title="Seed ranking — 1 is the top seed" />
        </td>
        <td>${p ? `<div class="participant-badge">
            <div class="avatar" style="background:${colorFor(pIdx)};color:#0f0e0c">${initials(p.name)}</div>
            ${esc(p.name)}
          </div>` : '<span style="color:var(--text-muted);font-style:italic;font-size:12px">Unassigned</span>'}</td>
        <td><span class="status-badge ${statusClass}">${t.status||'pending'}</span></td>
        <td><button class="assign-btn" onclick="openAssignModal(${i})">Assign</button></td>
      </tr>`;
    }).join('')}
    </tbody>
  </table>`;
}

// ══════════════════════════════════════════════
// BRACKET
// ══════════════════════════════════════════════
function defaultRoundName(rIdx, totalRounds) {
  const pos = totalRounds - 1 - rIdx; // 0 = final
  if (pos === 0) return 'Final';
  if (pos === 1) return 'Semi-Finals';
  if (pos === 2) return 'Quarter-Finals';
  const teams = Math.pow(2, pos + 1);
  return `Round of ${teams}`;
}

function renderBracket(s) {
  // ── SETUP MODE: no bracket yet ──
  if (!s.bracket || !s.bracket.rounds || !s.bracket.rounds.length) {
    return renderBracketSetup(s);
  }

  const { rounds } = s.bracket;
  const editing = s.bracket.editing === true;

  // ── EDIT MODE: show team selectors ──
  if (editing) {
    return renderBracketEdit(s);
  }

  // ── VIEW MODE: display bracket ──
  return renderBracketView(s);
}

function renderBracketSetup(s) {
  const teamCount = s.teams.filter(t => t.participant !== null && t.participant !== undefined).length;
  // Suggest sensible round counts
  const suggestions = [];
  for (let r = 1; r <= 5; r++) {
    const slots = Math.pow(2, r);
    suggestions.push({ rounds: r, slots, label: r === 1 ? 'Final only (2 teams)' : defaultRoundName(0, r) + ` (up to ${slots} teams)` });
  }

  return `
  <div class="alert alert-warn" style="margin-bottom:16px">No bracket set up yet. Configure it below.</div>
  <div class="bracket-setup">
    <div class="bracket-setup-title">Setup Bracket</div>
    <div class="form-group">
      <label>Number of Rounds</label>
      <select id="setupRounds" style="max-width:320px">
        ${suggestions.map(s => `<option value="${s.rounds}">${s.rounds} round${s.rounds>1?'s':''} — ${s.label}</option>`).join('')}
      </select>
    </div>
    <p style="font-size:12px;color:var(--text-muted);margin-bottom:16px">You have <strong style="color:var(--text)">${teamCount}</strong> assigned team${teamCount!==1?'s':''}. You'll manually place teams into each match slot after creating the bracket.</p>
    <button class="btn btn-primary" onclick="createBlankBracket()">Create Bracket →</button>
  </div>`;
}

function renderBracketEdit(s) {
  const { rounds } = s.bracket;
  const assignedTeams = s.teams.map((t,i)=>({...t,idx:i})).filter(t => t.participant !== null && t.participant !== undefined);

  let html = `
  <div class="alert alert-info" style="margin-bottom:16px">✏️ Edit mode — set the teams for each match slot, then click <strong>Confirm Bracket</strong>.</div>
  <div style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap">
    <button class="btn btn-primary btn-sm" onclick="confirmBracketSetup()">✓ Confirm Bracket</button>
    <button class="btn btn-danger btn-sm" onclick="confirmAction(this, clearBracket)">Discard & Reset</button>
  </div>`;

  rounds.forEach((round, rIdx) => {
    const isFirst = rIdx === 0;
    html += `<div style="margin-bottom:20px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <div class="section-title" style="margin:0">
          <input class="round-label-edit" value="${esc(round.label || defaultRoundName(rIdx, rounds.length))}"
            oninput="updateRoundLabel(${rIdx}, this.value)" title="Edit round name" />
        </div>
        ${isFirst ? `<button class="btn btn-ghost btn-sm" onclick="addMatchToRound(${rIdx})">+ Add Match</button>` : '<span style="font-size:11px;color:var(--text-muted)">Auto-populated from round 1</span>'}
      </div>
      <div class="setup-grid">`;

    round.matches.forEach((match, mIdx) => {
      const teamOptions = `<option value="">— TBD —</option>` +
        assignedTeams.map(t => `<option value="${t.idx}" ${match.team1===t.idx||match.team2===t.idx?'disabled':''}>${esc(t.name)}</option>`).join('');

      html += `<div class="setup-match">
        <div class="setup-match-header">Match ${mIdx + 1}
          ${isFirst && round.matches.length > 1 ? `<button onclick="removeMatchFromRound(${rIdx},${mIdx})" style="float:right;background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:13px" title="Remove match">×</button>` : ''}
        </div>
        ${isFirst ? `
        <select class="slot-select" onchange="setBracketSlot(${rIdx},${mIdx},0,this.value)" style="border-bottom:1px solid var(--border)">
          ${buildTeamOptions(s, match.team1, match.team2, 0)}
        </select>
        <select class="slot-select" onchange="setBracketSlot(${rIdx},${mIdx},1,this.value)">
          ${buildTeamOptions(s, match.team2, match.team1, 1)}
        </select>` : `
        <div style="padding:7px 10px;font-size:12px;color:var(--text-muted);border-bottom:1px solid var(--border)">Winner of R1 Match ${mIdx*2+1}</div>
        <div style="padding:7px 10px;font-size:12px;color:var(--text-muted)">Winner of R1 Match ${mIdx*2+2}</div>`}
      </div>`;
    });

    html += `</div></div>`;
  });

  return html;
}

function buildTeamOptions(s, selectedIdx, otherIdx, slot) {
  const assignedTeams = s.teams.map((t,i)=>({...t,idx:i})).filter(t => t.participant !== null && t.participant !== undefined);
  return `<option value="">— TBD / BYE —</option>` +
    assignedTeams.map(t => {
      const isSelected = t.idx === selectedIdx;
      const isOther = t.idx === otherIdx;
      return `<option value="${t.idx}" ${isSelected ? 'selected' : ''} ${isOther ? 'disabled' : ''}>${esc(t.name)}</option>`;
    }).join('');
}

function renderBracketView(s) {
  const { rounds } = s.bracket;
  let html = `<div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center">
    <button class="btn btn-ghost btn-sm" onclick="confirmAction(this, enterBracketEditMode)">✏️ Edit Bracket</button>
    <button class="btn btn-danger btn-sm" onclick="confirmAction(this, clearBracket)">Reset</button>
    <span style="font-size:12px;color:var(--text-muted);align-self:center">Click any match to enter a result</span>
  </div>
  <div class="bracket-wrap"><div class="bracket">`;

  rounds.forEach((round, rIdx) => {
    html += `<div class="bracket-round">
      <div class="round-label-wrap"><span class="round-label">${esc(round.label || defaultRoundName(rIdx, rounds.length))}</span></div>
      <div class="round-matches">`;

    round.matches.forEach((match, mIdx) => {
      const t1 = (match.team1 !== null && match.team1 !== undefined) ? s.teams[match.team1] : null;
      const t2 = (match.team2 !== null && match.team2 !== undefined) ? s.teams[match.team2] : null;
      const w = match.winner;
      const c1 = w === 0 ? 'winner' : (w !== null && w !== undefined) ? 'loser' : '';
      const c2 = w === 1 ? 'winner' : (w !== null && w !== undefined) ? 'loser' : '';

      html += `<div class="match-slot">
        <div class="match-card-b clickable" onclick="openBracketResult(${rIdx},${mIdx})">
          <div class="b-team ${c1}">
            <span class="b-name">${t1 ? esc(t1.name) : '<span class="bye-label">TBD</span>'}</span>
            <span class="b-score">${match.score1 !== null && match.score1 !== undefined ? match.score1 : '—'}</span>
          </div>
          <div class="b-team ${c2}">
            <span class="b-name">${t2 ? esc(t2.name) : '<span class="bye-label">TBD</span>'}</span>
            <span class="b-score">${match.score2 !== null && match.score2 !== undefined ? match.score2 : '—'}</span>
          </div>
        </div>
      </div>`;
    });

    html += `</div></div>`;
    if (rIdx < rounds.length - 1) html += `<div class="connector"></div>`;
  });

  html += `</div></div>`;

  // Champion banner
  const finalMatch = rounds[rounds.length - 1].matches[0];
  if (finalMatch && finalMatch.winner !== null && finalMatch.winner !== undefined) {
    const champIdx = finalMatch.winner === 0 ? finalMatch.team1 : finalMatch.team2;
    const champ = champIdx !== null && champIdx !== undefined ? s.teams[champIdx] : null;
    if (champ) {
      const p = champ.participant !== null && champ.participant !== undefined ? s.participants[champ.participant] : null;
      html += `<div style="margin-top:20px;text-align:center;padding:20px;background:rgba(240,180,41,0.08);border:1px solid rgba(240,180,41,0.3);border-radius:var(--radius)">
        <div style="font-size:32px;margin-bottom:6px">🏆</div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--gold)">Champion: ${esc(champ.name)}</div>
        ${p ? `<div style="font-size:13px;color:var(--text-muted);margin-top:4px">Held by ${esc(p.name)}</div>` : ''}
      </div>`;
    }
  }

  return html;
}

// RESULTS
// ══════════════════════════════════════════════
function renderResults(s) {
  if (!s.bracket || !s.bracket.rounds || !s.bracket.rounds.length) {
    return '<div class="no-data">Generate a bracket first from the Bracket tab.</div>';
  }

  const { rounds } = s.bracket;
  const totalRounds = rounds.length;

  let html = '<div class="results-grid">';
  rounds.forEach((round, rIdx) => {
    const remaining = Math.pow(2, totalRounds - rIdx);
    const label = rIdx === totalRounds-1 ? 'Final' : remaining===4?'Semi-Finals':remaining===8?'Quarter-Finals':`R${rIdx+1}`;

    round.matches.forEach((match, mIdx) => {
      const t1 = (match.team1 !== null && match.team1 !== undefined) ? s.teams[match.team1] : null;
      const t2 = (match.team2 !== null && match.team2 !== undefined) ? s.teams[match.team2] : null;
      if (!t1 && !t2) return;
      const saved = match.winner !== null && match.winner !== undefined;

      html += `<div class="result-card">
        <div class="result-card-header">
          <span>${label} · Match ${mIdx+1}</span>
          ${saved ? '<span style="color:var(--green);font-size:10px">✓ SAVED</span>' : ''}
        </div>
        <div class="score-row">
          <span class="score-team-name" style="${match.winner===0?'color:var(--gold);font-weight:600':match.winner===1?'opacity:0.5':''}">
            ${t1 ? esc(t1.name) : '<em style="color:var(--text-muted)">TBD</em>'}
          </span>
          <input class="score-input" type="number" min="0" placeholder="0"
            value="${match.score1 !== null && match.score1 !== undefined ? match.score1 : ''}"
            id="rs_${rIdx}_${mIdx}_1" />
        </div>
        <div class="vs-divider">vs</div>
        <div class="score-row">
          <span class="score-team-name" style="${match.winner===1?'color:var(--gold);font-weight:600':match.winner===0?'opacity:0.5':''}">
            ${t2 ? esc(t2.name) : '<em style="color:var(--text-muted)">TBD</em>'}
          </span>
          <input class="score-input" type="number" min="0" placeholder="0"
            value="${match.score2 !== null && match.score2 !== undefined ? match.score2 : ''}"
            id="rs_${rIdx}_${mIdx}_2" />
        </div>
        <button class="confirm-btn ${saved?'saved':''}" onclick="confirmResult(${rIdx},${mIdx})">
          ${saved ? '✓ Result Saved — Click to Update' : 'Confirm Result'}
        </button>
      </div>`;
    });
  });

  html += '</div>';
  return html;
}

function renderPayouts(s) {
  const pot = s.participants.length * parseFloat(s.fee || 0);
  const medals = MEDALS;

  // Determine placed teams from bracket
  const placed = []; // [1st, 2nd, 3rd, ...]
  if (s.bracket && s.bracket.rounds && s.bracket.rounds.length) {
    const rounds = s.bracket.rounds;
    const finalMatch = rounds[rounds.length - 1].matches[0];
    if (finalMatch && finalMatch.winner !== null && finalMatch.winner !== undefined) {
      placed[0] = finalMatch.winner === 0 ? finalMatch.team1 : finalMatch.team2;
      placed[1] = finalMatch.winner === 0 ? finalMatch.team2 : finalMatch.team1;
    }
    // 3rd place from semi-final losers
    if (rounds.length >= 2) {
      rounds[rounds.length - 2].matches.forEach(m => {
        if (m.winner !== null && m.winner !== undefined) {
          const loser = m.winner === 0 ? m.team2 : m.team1;
          if (loser !== null && loser !== undefined && !placed.includes(loser)) placed.push(loser);
        }
      });
    }
  }

  let html = `<div class="section-title">Prize Pool: ${fmt(s.currency, pot)}</div>
  <div class="payout-card">
    ${s.split.map((sp, i) => {
      const amount = pot * sp.pct / 100;
      const champIdx = placed[i];
      const team = champIdx !== undefined ? s.teams[champIdx] : null;
      const pIdx = team ? team.participant : null;
      const participant = (pIdx !== null && pIdx !== undefined) ? s.participants[pIdx] : null;
      return `<div class="payout-row">
        <div class="payout-left">
          <span class="place-medal">${medals[i]||'🏅'}</span>
          <div>
            <div class="payout-label">${esc(sp.label)}</div>
            <div class="payout-winner">${team ? `${esc(team.name)}${participant ? ` · ${esc(participant.name)}` : ''}` : '<em>To be determined</em>'}</div>
          </div>
        </div>
        <div style="text-align:right">
          <div class="payout-amount">${fmt(s.currency, amount)}</div>
          <div class="payout-pct">${sp.pct}% of pot</div>
        </div>
      </div>`;
    }).join('')}
  </div>

  <div class="section-title">Participant Summary</div>
  <div style="font-size:12px;color:var(--text-muted);margin-bottom:12px">
    "Winnings" shows confirmed payouts based on bracket results. Until results are recorded it shows <strong style="color:var(--text)">—</strong>.
  </div>
  <table class="data-table">
    <thead><tr><th>Participant</th><th>Teams</th><th>Entry Paid</th><th>Winnings</th></tr></thead>
    <tbody>
    ${s.participants.map((p, pIdx) => {
      const myTeams = sortTeams(s.teams.filter(t => t.participant === pIdx));
      const winTotal = s.split.reduce((acc, sp, i) => {
        const champIdx = placed[i];
        if (champIdx === undefined) return acc;
        const champTeam = s.teams[champIdx];
        if (champTeam && champTeam.participant === pIdx) return acc + (pot * sp.pct / 100);
        return acc;
      }, 0);
      return `<tr>
        <td><div class="participant-badge">
          <div class="avatar" style="background:${colorFor(pIdx)};color:#0f0e0c">${initials(p.name)}</div>
          ${esc(p.name)}
        </div></td>
        <td>${myTeams.map(t => `<span class="status-badge ${t.status==='eliminated'?'status-eliminated':'status-active'}" style="margin-right:4px">${esc(t.name)}</span>`).join('') || '<span style="color:var(--text-muted)">—</span>'}</td>
        <td style="font-family:'DM Mono',monospace">${fmt(s.currency, s.fee)}</td>
        <td style="font-family:'DM Mono',monospace;color:${winTotal>0?'var(--gold)':'var(--text-muted)'}">${winTotal>0 ? fmt(s.currency, winTotal) : '—'}</td>
      </tr>`;
    }).join('')}
    </tbody>
  </table>`;

  return html;
}

let editingId = null;

function openEditModal() {

function addSplitRow() {
  const n = splitRows.length + 1;
  splitRows.push({ label: `${n}${SUFFIXES[n-1]||'th'} Place`, pct: 0 });
  renderSplitRows();
}

function renderSplitRows() {
  const colorClasses = ['gold-text','silver-text','bronze-text'];
  document.getElementById('splitRows').innerHTML = splitRows.map((sp, i) => `
    <div class="split-row">
      <span class="split-place-label ${colorClasses[i]||''}">${MEDALS[i]||'🏅'}</span>
      <input class="split-label-input" type="text" value="${esc(sp.label)}" oninput="splitRows[${i}].label=this.value" />
      <div class="split-pct-wrap">
        <input type="number" min="0" max="100" step="0.5" value="${sp.pct}" oninput="splitRows[${i}].pct=parseFloat(this.value)||0;updateSplitTotal()" />
        <span>%</span>
      </div>
      <button class="btn-icon" title="Remove" onclick="splitRows.splice(${i},1);renderSplitRows()">×</button>
    </div>`).join('');
  updateSplitTotal();
}

function updateSplitTotal() {
  const total = splitRows.reduce((a, sp) => a + (parseFloat(sp.pct)||0), 0);
  const el = document.getElementById('splitTotal');
  el.textContent = `Total: ${total.toFixed(1)}%`;
  el.className = 'split-total ' + (Math.abs(total-100)<0.01 ? 'ok' : total>100 ? 'error' : '');
}

function addTeamInput() { teamInputs.push(''); renderTeamInputs(); }
function renderTeamInputs() {
  document.getElementById('teamCountTag').textContent = teamInputs.length;
  document.getElementById('teamInputs').innerHTML = teamInputs.map((t, i) => `
    <div class="list-input-row">
      <input type="text" value="${esc(t)}" placeholder="Team name" oninput="teamInputs[${i}]=this.value" />
      <button class="btn-icon" title="Remove" onclick="teamInputs.splice(${i},1);renderTeamInputs()">×</button>
    </div>`).join('');
}

function addParticipantInput() { participantInputs.push(''); renderParticipantInputs(); }
function renderParticipantInputs() {
  document.getElementById('participantCountTag').textContent = participantInputs.length;
  document.getElementById('participantInputs').innerHTML = participantInputs.map((p, i) => `
    <div class="list-input-row">
      <input type="text" value="${esc(p)}" placeholder="Participant name" oninput="participantInputs[${i}]=this.value" />
      <button class="btn-icon" title="Remove" onclick="participantInputs.splice(${i},1);renderParticipantInputs()">×</button>
    </div>`).join('');
}

function saveSweepstake() {
  const name = document.getElementById('sweepName').value.trim();
  const fee = document.getElementById('sweepFee').value || '0';
  const currency = document.getElementById('sweepCurrency').value.trim() || '£';

  // Clear previous errors
  document.querySelectorAll('.field-error').forEach(e => e.remove());

  let hasError = false;

  if (!name) {
    showFieldError('sweepName', 'Please enter a competition name.');
    hasError = true;
  }

  const total = splitRows.reduce((a, sp) => a + (parseFloat(sp.pct)||0), 0);
  if (Math.abs(total - 100) > 0.01) {
    const el = document.getElementById('splitTotal');
    const err = document.createElement('div');
    err.className = 'field-error';
    err.textContent = `Split must total 100% — currently ${total.toFixed(1)}%`;
    el.after(err);
    hasError = true;
  }

  if (hasError) return;

  const teams = teamInputs.filter(t => t.trim()).map(t => ({ name: t.trim(), status: 'pending', participant: null }));
  const participants = participantInputs.filter(p => p.trim()).map(p => ({ name: p.trim() }));

  if (editingId) {
    const idx = state.sweepstakes.findIndex(s => s.id === editingId);
    if (idx !== -1) {
      const existing = state.sweepstakes[idx];
      const newTeams = teams.map(nt => {
        const old = existing.teams.find(ot => ot.name === nt.name);
        return old ? { ...old } : nt;
      });
      state.sweepstakes[idx] = { ...existing, name, fee, currency, split: splitRows.map(s=>({...s})), teams: newTeams, participants };
    }
  } else {
    const newSweep = {
      id: uid(), name, fee, currency,
      split: splitRows.map(s=>({...s})),
      teams, participants,
      status: 'draft',
      bracket: null,
      groups: null
    };
    applyPendingTemplate(newSweep);
    state.sweepstakes.push(newSweep);
    state.activeSweepId = newSweep.id;
    currentTab = 'overview';
  }

  save();
  closeModal('sweepModal');
  renderSidebar();
  renderMain();
}

function showFieldError(inputId, msg) {
  const el = document.getElementById(inputId);
  if (!el) return;
  el.style.borderColor = 'var(--red)';
  const err = document.createElement('div');
  err.className = 'field-error';
  err.textContent = msg;
  el.after(err);
  el.addEventListener('input', () => { el.style.borderColor = ''; err.remove(); }, { once: true });
}

// DRAW ACTIONS
// ══════════════════════════════════════════════
function doRandomDraw() {
  const s = getActive();
  if (!s || !s.teams.length || !s.participants.length) return;
  // Distribute as evenly as possible
  const indices = [];
  for (let i = 0; i < s.teams.length; i++) indices.push(i % s.participants.length);
  // Shuffle assignment array
  for (let i = indices.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [indices[i], indices[j]] = [indices[j], indices[i]];
  }
  s.teams.forEach((t, i) => { t.participant = indices[i]; t.status = 'active'; });
  save(); renderMain();
}

function doRandomDrawUnassigned() {
  const s = getActive();
  if (!s) return;
  const unassigned = s.teams.map((t,i)=>i).filter(i => s.teams[i].participant===null||s.teams[i].participant===undefined);
  // Shuffle
  for (let i = unassigned.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [unassigned[i],unassigned[j]]=[unassigned[j],unassigned[i]];
  }
  unassigned.forEach((teamIdx, i) => { s.teams[teamIdx].participant = i % s.participants.length; s.teams[teamIdx].status = 'active'; });
  save(); renderMain();
}

function clearAllAssignments() {
  const s = getActive();
  if (!s) return;
  s.teams.forEach(t => { t.participant = null; t.status = 'pending'; });
  save(); renderTab();
}

function setTeamSeed(teamIdx, value) {
  const s = getActive();
  if (!s) return;
  const parsed = parseInt(value);
  s.teams[teamIdx].seed = isNaN(parsed) || value === '' ? null : parsed;
  save();
}

function doSeededDraw() {
  const s = getActive();
  if (!s || !s.teams.length || !s.participants.length) return;

  const seeded   = s.teams.map((t,i) => ({...t, idx:i})).filter(t => t.seed != null).sort((a,b) => a.seed - b.seed);
  const unseeded = s.teams.map((t,i) => ({...t, idx:i})).filter(t => t.seed == null);

  if (!seeded.length) {
    alert('No seeds set. Add seed numbers in the Seed column first, then run Seeded Draw.\n\nUsing Random Draw instead.');
    doRandomDraw();
    return;
  }

  const n = s.participants.length;

  // Shuffle participant order so the draw feels random
  const participantOrder = Array.from({length: n}, (_,i) => i);
  for (let i = participantOrder.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [participantOrder[i], participantOrder[j]] = [participantOrder[j], participantOrder[i]];
  }

  // Split seeded teams into tiers of n, distribute each tier so every
  // participant gets one team from each tier (snake draft within tier)
  const assignments = {};
  let tierStart = 0;
  while (tierStart < seeded.length) {
    const tier = seeded.slice(tierStart, tierStart + n);
    // Shuffle within the tier for randomness
    for (let i = tier.length-1; i>0; i--) {
      const j = Math.floor(Math.random()*(i+1));
      [tier[i], tier[j]] = [tier[j], tier[i]];
    }
    tier.forEach((team, pos) => {
      assignments[team.idx] = participantOrder[pos % n];
    });
    tierStart += n;
  }

  // Distribute unseeded teams evenly at random
  const shuffledUnseeded = [...unseeded].sort(() => Math.random() - 0.5);
  const counts = Array(n).fill(0);
  Object.values(assignments).forEach(pIdx => counts[pIdx]++);
  shuffledUnseeded.forEach(team => {
    const minCount = Math.min(...counts);
    const candidates = counts.map((c,i)=>i).filter(i => counts[i] === minCount);
    const chosen = candidates[Math.floor(Math.random()*candidates.length)];
    assignments[team.idx] = chosen;
    counts[chosen]++;
  });

  // Apply
  s.teams.forEach((t, i) => {
    t.participant = assignments[i] !== undefined ? assignments[i] : (i % n);
    t.status = 'active';
  });

  save(); renderMain();
}

// BRACKET MANAGEMENT (MANUAL)
// ══════════════════════════════════════════════
function blankMatch() {
  return { team1: null, team2: null, score1: null, score2: null, winner: null };
}

function createBlankBracket() {
  const s = getActive();
  if (!s) return;
  const numRounds = parseInt(document.getElementById('setupRounds').value);
  if (!numRounds || numRounds < 1) return;

  const rounds = [];
  for (let r = 0; r < numRounds; r++) {
    const matchCount = Math.pow(2, numRounds - 1 - r);
    const matches = Array.from({ length: matchCount }, blankMatch);
    rounds.push({ label: defaultRoundName(r, numRounds), matches });
  }

  s.bracket = { rounds, editing: true };
  s.teams.forEach(t => { if (t.participant !== null && t.participant !== undefined) t.status = 'active'; });
  save(); renderMain();
}

function enterBracketEditMode() {
  const s = getActive();
  if (!s || !s.bracket) return;
  s.bracket.editing = true;
  save(); renderTab();
}

function clearBracket() {
  const s = getActive();
  if (!s) return;
  s.bracket = null;
  s.teams.forEach(t => { if (t.participant !== null && t.participant !== undefined) t.status = 'active'; });
  save(); renderTab();
}

function updateRoundLabel(rIdx, value) {
  const s = getActive();
  if (!s || !s.bracket) return;
  s.bracket.rounds[rIdx].label = value;
  save();
}

function setBracketSlot(rIdx, mIdx, slot, value) {
  const s = getActive();
  if (!s || !s.bracket) return;
  const match = s.bracket.rounds[rIdx].matches[mIdx];
  const teamIdx = value === '' ? null : parseInt(value);
  if (slot === 0) match.team1 = teamIdx;
  else match.team2 = teamIdx;
  // Clear result if teams changed
  match.score1 = null; match.score2 = null; match.winner = null;
  save(); renderTab(); // re-render just the tab to refresh disabled options
}

function addMatchToRound(rIdx) {
  const s = getActive();
  if (!s || !s.bracket) return;
  s.bracket.rounds[rIdx].matches.push(blankMatch());
  // Ensure subsequent rounds have enough slots
  rebuildLaterRounds(s);
  save(); renderMain();
}

function removeMatchFromRound(rIdx, mIdx) {
  const s = getActive();
  if (!s || !s.bracket) return;
  if (s.bracket.rounds[rIdx].matches.length <= 1) { alert('A round must have at least one match.'); return; }
  s.bracket.rounds[rIdx].matches.splice(mIdx, 1);
  rebuildLaterRounds(s);
  save(); renderMain();
}

function rebuildLaterRounds(s) {
  // After round 0 changes, rebuild subsequent rounds to have correct match counts
  const rounds = s.bracket.rounds;
  for (let r = 1; r < rounds.length; r++) {
    const needed = Math.ceil(rounds[r-1].matches.length / 2);
    const current = rounds[r].matches.length;
    if (current < needed) {
      for (let i = current; i < needed; i++) rounds[r].matches.push(blankMatch());
    } else if (current > needed) {
      rounds[r].matches.splice(needed);
    }
    // Clear team slots for auto-populated rounds
    rounds[r].matches.forEach(m => { m.team1 = null; m.team2 = null; m.score1 = null; m.score2 = null; m.winner = null; });
  }
}

function confirmBracketSetup() {
  const s = getActive();
  if (!s || !s.bracket) return;
  s.bracket.editing = false;
  save(); renderTab();
}

let bracketResultMeta = null;

function openBracketResult(rIdx, mIdx) {
  const s = getActive();
  if (!s || !s.bracket) return;
  const match = s.bracket.rounds[rIdx].matches[mIdx];
  const t1 = match.team1 !== null && match.team1 !== undefined ? s.teams[match.team1] : null;
  const t2 = match.team2 !== null && match.team2 !== undefined ? s.teams[match.team2] : null;
  if (!t1 && !t2) return;

  bracketResultMeta = { rIdx, mIdx };

  document.getElementById('bracketResultContent').innerHTML = `
    <div class="score-row" style="margin-bottom:8px">
      <span class="score-team-name">${t1 ? esc(t1.name) : '<em>BYE</em>'}</span>
      <input class="score-input" type="number" min="0" placeholder="0" value="${match.score1 !== null && match.score1 !== undefined ? match.score1 : ''}" id="brs1" />
    </div>
    <div class="vs-divider">vs</div>
    <div class="score-row" style="margin-top:8px">
      <span class="score-team-name">${t2 ? esc(t2.name) : '<em>BYE</em>'}</span>
      <input class="score-input" type="number" min="0" placeholder="0" value="${match.score2 !== null && match.score2 !== undefined ? match.score2 : ''}" id="brs2" />
    </div>
    <p style="font-size:11px;color:var(--text-muted);margin-top:12px">Scores must differ to determine a winner. The higher score advances.</p>`;

  openModal('bracketResultModal');
}

function saveBracketResult() {
  if (!bracketResultMeta) return;
  const s = getActive();
  const { rIdx, mIdx } = bracketResultMeta;
  const match = s.bracket.rounds[rIdx].matches[mIdx];
  const score1 = parseInt(document.getElementById('brs1').value);
  const score2 = parseInt(document.getElementById('brs2').value);

  if (isNaN(score1) || isNaN(score2)) { alert('Please enter scores for both teams.'); return; }
  if (score1 === score2) { alert('Scores cannot be equal — there must be a winner.'); return; }

  match.score1 = score1;
  match.score2 = score2;
  match.winner = score1 > score2 ? 0 : 1;

  const winnerIdx = match.winner === 0 ? match.team1 : match.team2;
  const loserIdx  = match.winner === 0 ? match.team2 : match.team1;
  if (loserIdx !== null && loserIdx !== undefined) s.teams[loserIdx].status = 'eliminated';
  if (winnerIdx !== null && winnerIdx !== undefined) s.teams[winnerIdx].status = 'active';

  // Advance winner to next round slot
  const nextRound = s.bracket.rounds[rIdx + 1];
  if (nextRound) {
    const nextMatchIdx = Math.floor(mIdx / 2);
    const slot = mIdx % 2 === 0 ? 'team1' : 'team2';
    if (nextRound.matches[nextMatchIdx]) {
      nextRound.matches[nextMatchIdx][slot] = winnerIdx;
      // Clear that match's result since a team changed
      nextRound.matches[nextMatchIdx].score1 = null;
      nextRound.matches[nextMatchIdx].score2 = null;
      nextRound.matches[nextMatchIdx].winner = null;
    }
  }

  save();
  closeModal('bracketResultModal');
  renderMain();
}

// Also handle results tab confirm button
function confirmResult(rIdx, mIdx) {
  const s = getActive();
  if (!s || !s.bracket) return;
  const match = s.bracket.rounds[rIdx].matches[mIdx];
  const s1 = parseInt(document.getElementById(`rs_${rIdx}_${mIdx}_1`)?.value);
  const s2 = parseInt(document.getElementById(`rs_${rIdx}_${mIdx}_2`)?.value);
  if (isNaN(s1) || isNaN(s2)) { alert('Enter scores for both teams.'); return; }
  if (s1 === s2) { alert('Scores cannot be equal — there must be a winner.'); return; }

  match.score1 = s1; match.score2 = s2;
  match.winner = s1 > s2 ? 0 : 1;
  const winnerIdx = match.winner===0 ? match.team1 : match.team2;
  const loserIdx  = match.winner===0 ? match.team2 : match.team1;
  if (loserIdx !== null && loserIdx !== undefined) s.teams[loserIdx].status = 'eliminated';
  const nextRound = s.bracket.rounds[rIdx + 1];
  if (nextRound) {
    const ni = Math.floor(mIdx/2);
    const slot = mIdx%2===0 ? 'team1' : 'team2';
    if (nextRound.matches[ni]) nextRound.matches[ni][slot] = winnerIdx;
  }
  save(); renderMain();
}

    html += `<div class="group-card">

  allThirds.sort((a,b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf);

    ${setup.best3rd > 0 ? `<span><div class="legend-dot" style="background:var(--gold)"></div> Best 3rd place</span>` : ''}
    <span style="font-size:11px">Points: W=${setup.ptsWin} D=${setup.ptsDraw} L=0 &nbsp;|&nbsp; GD = Goal Difference</span>
